{% extends 'base.html' %}
{% load static %}

{% block title %}
페이지이름
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth/login.css' %}">
{% endblock %}

{% block content %}

<!-- 페이지 내용: 여기부터 코딩하면됨!! -->
<div class="login-frame">
    <div class="login-main">
        <div class="login-title">
            <p>별조각</p>
            <p>매일의추억을새겨보세요</p>
        </div>
        <div class="login-card">
            <form action="{% url 'accounts:login' %}" method="POST" class="form-box">
                {% csrf_token %}
                <div class="form-group">
                    <label for="login-username">아이디</label>
                    <input id="login-username" type="text" name="username" placeholder=" abc123 / user9" required>
                </div>
                <div class="form-group">
                    <label for="login-password">비밀번호</label>
                    <input id="login-password" type="password" name="password" placeholder="• • • • • • • • • • • •"
                        required>
                </div>
                <button type="submit" class="primary-button">
                    <p>로그인</p>
                    <img src="{% static 'images/ArrowRight.svg' %}">
                </button>
            </form>
            <p class="signup">계정이없으신가요? <a href="{% url 'accounts:signup' %}">회원가입</a></p>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="{% static 'js/페이지js경로.js' %}"></script>
{% endblock %}
